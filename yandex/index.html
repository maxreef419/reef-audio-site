<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>REEF Audio × Яндекс</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
<meta name="theme-color" content="#2e2e2e" />
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#2e2e2e;--bg-3:#242424;--surface:#383838;
  --line:rgba(255,255,255,.16);
  --text:#f4f6f6;--muted:#c6c9c9;--muted-2:#9a9e9e;
  --cyan:#19b6e6;--cyan-soft:#5fcbee;--cyan-deep:#0f8ab4;--green:#4ade80;
  --grad:linear-gradient(135deg,#19b6e6 0%,#4ade80 100%);
  --font-display:'Cabinet Grotesk','CabinetFallback',system-ui,sans-serif;
  --font-body:'Satoshi','SatoshiFallback',system-ui,sans-serif;
  --pad:clamp(22px,5vw,88px);
  --ease:cubic-bezier(.16,1,.3,1);
}
@font-face{font-family:'CabinetFallback';src:local('Arial');size-adjust:97%;ascent-override:96%;descent-override:24%;line-gap-override:0%}
@font-face{font-family:'SatoshiFallback';src:local('Arial');size-adjust:100%;ascent-override:95%;descent-override:25%;line-gap-override:0%}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg-3);color:var(--text);
  font-family:var(--font-body);font-size:16px;line-height:1.5;letter-spacing:-.011em;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}

/* ===== GATE ===== */
.gate{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(48px,10vh,110px) var(--pad);
  background:var(--bg-3);overflow:hidden;
}
.gate::before{
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(90% 70% at 82% 10%,rgba(25,182,230,.16),transparent 55%),
             radial-gradient(80% 70% at 8% 96%,rgba(74,222,128,.08),transparent 60%);
}
.gate__head{position:absolute;top:clamp(30px,4.4vh,46px);left:var(--pad);right:var(--pad);z-index:4;
  display:flex;align-items:center;justify-content:space-between}
.gate__logo{height:26px;width:auto;object-fit:contain}
.gate__year{font-size:11px;font-weight:600;letter-spacing:.2em;color:var(--muted-2)}
.gate__inner{position:relative;z-index:3;width:100%;max-width:520px;margin:0 auto}
.gate__pill{display:inline-flex;align-items:center;gap:9px;padding:9px 18px;border:1px solid var(--line);border-radius:100px;
  font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.02);margin-bottom:clamp(22px,4vh,34px)}
.gate__pdot{width:7px;height:7px;border-radius:50%;background:var(--grad);box-shadow:0 0 0 4px rgba(25,182,230,.16),0 0 14px rgba(25,182,230,.7)}
.gate__title{font-family:var(--font-display);font-weight:900;letter-spacing:-.03em;line-height:.98;font-size:clamp(38px,7vw,72px)}
.gate__title .plus{color:transparent;background:var(--grad);-webkit-background-clip:text;background-clip:text;font-weight:800}
.gate__sub{margin-top:clamp(16px,3vh,24px);color:var(--muted);font-size:clamp(15px,1.4vw,18px);line-height:1.5;max-width:34ch}
.gate__form{margin-top:clamp(30px,5vh,44px);display:flex;flex-direction:column;gap:14px;max-width:400px}
.gate__label{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2)}
.gate__row{display:flex;gap:10px}
.gate__input{
  flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:15px 16px;color:var(--text);font-family:var(--font-body);font-size:16px;letter-spacing:.02em;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease);outline:none;
}
.gate__input::placeholder{color:var(--muted-2)}
.gate__input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(25,182,230,.16)}
.gate__btn{
  flex:none;border:0;cursor:pointer;border-radius:12px;padding:15px 26px;
  font-family:var(--font-display);font-weight:800;font-size:15px;letter-spacing:.01em;color:#0a2027;
  background:var(--grad);transition:transform .2s var(--ease),filter .2s var(--ease);
}
.gate__btn:hover{filter:brightness(1.08)}
.gate__btn:active{transform:scale(.97)}
.gate__err{min-height:18px;font-size:13px;font-weight:600;color:#ff7a7a;opacity:0;transition:opacity .2s}
.gate__err.show{opacity:1}
.gate__foot{position:absolute;left:var(--pad);bottom:clamp(28px,4vh,40px);z-index:4;font-size:clamp(12px,1vw,14px);color:var(--muted-2)}
.gate__mark{position:absolute;right:var(--pad);bottom:clamp(24px,3.6vh,36px);z-index:4;font-family:var(--font-display);font-weight:800;font-size:clamp(20px,2.4vw,28px);color:var(--cyan)}
.shake{animation:shake .4s var(--ease)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}}

/* ===== DECK FRAME ===== */
#deckFrame{position:fixed;inset:0;z-index:20;width:100%;height:100%;border:0;background:var(--bg-3);display:none}
body.unlocked{overflow:hidden}
body.unlocked .gate{display:none}
body.unlocked #deckFrame{display:block}

/* loading */
.gate__btn.loading{pointer-events:none;opacity:.7}
@media(prefers-reduced-motion:reduce){.shake{animation:none}}
</style>
</head>
<body>

<section class="gate" id="gate">
  <div class="gate__head">
    <img class="gate__logo" src="assets/brand-logo.png" alt="REEF Audio" />
    <span class="gate__year">2026</span>
  </div>

  <div class="gate__inner">
    <span class="gate__pill"><span class="gate__pdot"></span>Коммерческое предложение</span>
    <h1 class="gate__title">REEF&nbsp;Audio<br><span class="plus">+</span>&nbsp;Яндекс</h1>
    <p class="gate__sub">Материал доступен по паролю. Введите его, чтобы открыть презентацию.</p>

    <form class="gate__form" id="gateForm" autocomplete="off">
      <label class="gate__label" for="pw">Пароль доступа</label>
      <div class="gate__row">
        <input class="gate__input" id="pw" type="password" placeholder="••••••••" autocomplete="off" autofocus aria-label="Пароль" />
        <button class="gate__btn" type="submit" id="go">Открыть</button>
      </div>
      <div class="gate__err" id="err">Неверный пароль. Попробуйте ещё раз.</div>
    </form>
  </div>

  <div class="gate__foot">Макс Кузниченков&nbsp;&nbsp;·&nbsp;&nbsp;www.thereefaudio.com</div>
  <div class="gate__mark">REEF.</div>
</section>

<iframe id="deckFrame" title="REEF Audio × Яндекс — презентация"></iframe>

<script>
(function(){
  var HASH = "769b4c07a42b9b1c66541d22c83e210dc808527fb22a99f5ca66824a83c51923"; // sha256("REEF4YANDEX")
  var DECK = "deck-9f3a2b7c.html";
  var KEY  = "reef_yx_ok";

  var form=document.getElementById("gateForm"),
      pw=document.getElementById("pw"),
      err=document.getElementById("err"),
      btn=document.getElementById("go"),
      inner=document.querySelector(".gate__inner"),
      frame=document.getElementById("deckFrame");

  function sha256(str){
    var buf=new TextEncoder().encode(str);
    return crypto.subtle.digest("SHA-256",buf).then(function(hash){
      return Array.prototype.map.call(new Uint8Array(hash),function(b){return b.toString(16).padStart(2,"0")}).join("");
    });
  }

  function loadDeck(){
    return fetch(DECK,{cache:"no-store"}).then(function(r){
      if(!r.ok) throw new Error("load");
      return r.text();
    }).then(function(html){
      frame.setAttribute("srcdoc",html);
      document.body.classList.add("unlocked");
      try{ frame.focus(); }catch(e){}
    });
  }

  function fail(){
    err.classList.add("show");
    inner.classList.remove("shake"); void inner.offsetWidth; inner.classList.add("shake");
    pw.value=""; pw.focus();
    btn.classList.remove("loading"); btn.textContent="Открыть";
  }

  form.addEventListener("submit",function(e){
    e.preventDefault();
    err.classList.remove("show");
    btn.classList.add("loading"); btn.textContent="Проверяем…";
    sha256(pw.value).then(function(h){
      if(h===HASH){
        try{ sessionStorage.setItem(KEY,"1"); }catch(e){}
        loadDeck().catch(function(){ btn.classList.remove("loading"); btn.textContent="Открыть"; err.textContent="Не удалось загрузить. Обновите страницу."; err.classList.add("show"); });
      } else { fail(); }
    }).catch(fail);
  });

  // auto-unlock within the same browser session
  try{
    if(sessionStorage.getItem(KEY)==="1"){ loadDeck(); }
  }catch(e){}
})();
</script>
</body>
</html>
